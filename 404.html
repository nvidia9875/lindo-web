<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="robots" content="noindex" />
<title>ページが見つかりません | LINDO</title>
<meta name="theme-color" content="#3c3a20" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;1,500&family=Zen+Kaku+Gothic+New:wght@400;500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="/assets/tokens.css" />
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    font-family:var(--font-sans-jp);
    background:var(--olive-800);
    color:var(--on-dark);
    min-height:100svh;
    display:grid;
    place-items:center;
    text-align:center;
    padding:2rem;
    background-image:
      radial-gradient(circle at 20% 0%, rgba(231,156,176,.10), transparent 42%),
      radial-gradient(circle at 90% 100%, rgba(185,168,107,.08), transparent 40%);
  }
  .code{font-family:var(--font-serif-en);font-style:italic;font-size:var(--text-hero);line-height:.9;color:var(--pink)}
  h1{font-family:var(--font-serif-en);font-weight:500;font-size:var(--text-xl);letter-spacing:.04em;margin:1rem 0 .4rem}
  p{color:var(--muted-dark);max-width:38ch;margin:0 auto 2rem}
  .home{
    display:inline-block;font-size:var(--text-sm);letter-spacing:.18em;text-transform:uppercase;
    color:var(--olive-900);background:var(--pink);padding:.9em 1.8em;border-radius:var(--radius-pill);
    transition:transform var(--dur) var(--ease),background var(--dur) var(--ease);text-decoration:none
  }
  .home:hover{transform:translateY(-3px);background:var(--pink-soft)}
  .home:focus-visible{outline:2px solid var(--pink-soft);outline-offset:3px}
</style>
</head>
<body>
  <main>
    <p class="code">404</p>
    <h1>Page Not Found</h1>
    <p>お探しのページは見つかりませんでした。<br>URLが変更されたか、削除された可能性があります。</p>
    <a class="home" href="/">トップへ戻る</a>
  </main>
</body>
</html>
